name: Run test_getMethodNames_ContainExtendsParentMethods

on:
  work_dispatch:
  push:
    branches: 
      - flaky-test-fixed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
        
    - name: Run test
      run: mvn -pl dubbo-common test -Dtest=org.apache.dubbo.common.bytecode.WrapperTest#test_getMethodNames_ContainExtendsParentMethods
