name: Run test_getMethodNames_ContainExtendsParentMethods

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'     
        required: true
        default: 'warning'
      tags:
        description: 'Test scenario tags' 
  push:
    branches: 
      - flaky-test-fixed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Install Nondex
      run: mvn org.apache.maven.plugins:maven-dependency-plugin:get -Dartifact=edu.illinois:nondex-maven-plugin:2.1.7
        
    - name: Run test
      run: mvn -pl dubbo-common edu.illinois:nondex-maven-plugin:2.1.7 -Dtest=org.apache.dubbo.common.bytecode.WrapperTest#test_getMethodNames_ContainExtendsParentMethods
